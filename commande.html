<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Commande Shan's Cookies Délices</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #fff8f0;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }
    h1 {
      color: #a0522d;
      text-align: center;
    }
    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }
    select,
    input[type="text"],
    button {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 5px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }
    button {
      background-color: #a0522d;
      color: white;
      border: none;
      cursor: pointer;
      font-size: 1.1em;
    }
    button:hover {
      background-color: #8b4513;
    }
    .info-paiement {
      background-color: #fff0e0;
      padding: 10px;
      border: 1px dashed #a0522d;
      margin-top: 20px;
      font-size: 1.1em;
    }
    .carousel {
      position: relative;
      width: 100%;
      overflow: hidden;
      border-radius: 10px;
      margin: 20px 0;
      height: 300px;
    }
    .carousel-track {
      display: flex;
      transition: transform 0.5s ease-in-out;
      height: 100%;
    }
    .carousel-slide {
      min-width: 100%;
      height: 100%;
      position: relative;
      text-align: center;
      color: #a0522d;
      font-weight: bold;
      font-size: 1.3em;
      user-select: none;
    }
    .carousel-slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 10px;
      filter: brightness(85%);
    }
    .carousel-caption {
      position: absolute;
      bottom: 15px;
      left: 50%;
      transform: translateX(-50%);
      background-color: rgba(255, 248, 240, 0.75);
      padding: 8px 20px;
      border-radius: 20px;
      color: #a0522d;
      text-shadow: 1px 1px 2px #fff;
    }
  </style>
</head>
<body>

  <h1>🍪 Commande Shan's Cookies Délices</h1>

  <div class="carousel" aria-label="Menu des cookies en défilement">
    <div class="carousel-track" id="carouselTrack">
      <div class="carousel-slide">
        <img src="https://www.valrhona-collection.com/cdn/shop/articles/cookie-praline_ee27398f-88aa-49ab-9eaa-71844a366235_1200x.jpg?v=1751554380" alt="Choco Craquant praline">
        <div class="carousel-caption">Choco Craquant</div>
      </div>
      <div class="carousel-slide">
        <img src="https://livingsweetmoments.com/wp-content/uploads/2016/05/passion-fruit-thumbprint-cookies-recipe-2.jpg" alt="Vanille Passion fruit de la passion">
        <div class="carousel-caption">Vanille Passion</div>
      </div>
      <div class="carousel-slide">
        <img src="https://eumm8di4sfb.exactdn.com/wp-content/uploads/2021/02/Cookies-caramel-pepites-chocolat-13.jpg?strip=all&lossy=1&quality=75&webp=70&ssl=1" alt="Caramel Beurre Salé gourmand">
        <div class="carousel-caption">Caramel Beurre Salé</div>
      </div>
      <div class="carousel-slide">
        <img src="https://www.eatsomethingsexy.com/wp-content/uploads/2017/12/dutch-crunchy-coconut-cookies.jpg" alt="Noix de Coco Rêvée cookies coco">
        <div class="carousel-caption">Noix de Coco Rêvée</div>
      </div>
      <div class="carousel-slide">
        <img src="https://fr.rc-cdn.community.thermomix.com/recipeimage/7q7hk5ds-7739f-297634-cfcd2-nfb9t97d/b936d7bf-5634-4e6c-99d6-6860fdf835c1/original/biscuits-citron-gingembre.jpg" alt="Citron Gingembre biscuits">
        <div class="carousel-caption">Citron Gingembre</div>
      </div>
    </div>
  </div>

  <div class="info-paiement">
    <p><strong>Étape 1 :</strong> Faites le paiement via MTN MoMo au <strong>+229 96600126</strong></p>
    <p><strong>Étape 2 :</strong> Entrez le code de transaction reçu ci-dessous pour valider votre commande.</p>
  </div>

  <form id="commandeForm">
    <label for="produit">Choisissez votre saveur :</label>
    <select id="produit" required>
      <option value="">-- Sélectionnez --</option>
      <option value="Choco Craquant">Choco Craquant</option>
      <option value="Vanille Passion">Vanille Passion</option>
      <option value="Caramel Beurre Salé">Caramel Beurre Salé</option>
      <option value="Noix de Coco Rêvée">Noix de Coco Rêvée</option>
      <option value="Citron Gingembre">Citron Gingembre</option>
    </select>

    <label for="transaction">Code de transaction MoMo :</label>
    <input
      type="text"
      id="transaction"
      placeholder="Ex: 123456789"
      pattern="[0-9]{9}"
      title="Le code doit contenir 9 chiffres"
      required
    />

    <button type="submit">Valider la commande</button>
  </form>

  <script>
    document.getElementById("commandeForm").addEventListener("submit", function (e) {
      e.preventDefault();
      const produit = document.getElementById("produit").value;
      const code = document.getElementById("transaction").value;
      const regex = /^[0-9]{9}$/;
      if (!produit) {
        alert("Veuillez choisir une saveur.");
        return;
      }
      if (!regex.test(code)) {
        alert("❌ Le code de transaction doit contenir exactement 9 chiffres.");
        return;
      }
      const message = `Bonjour, j'ai payé pour la saveur "${produit}" avec le code de transaction ${code}.`;
      const whatsappURL = `https://wa.me/22996600126?text=${encodeURIComponent(message)}`;
      window.open(whatsappURL, "_blank");
    });

    const track = document.getElementById("carouselTrack");
    const slides = track.children;
    let index = 0;

    setInterval(() => {
      index = (index + 1) % slides.length;
      track.style.transform = `translateX(-${index * 100}%)`;
    }, 3000);
  </script>
</body>
</html>
