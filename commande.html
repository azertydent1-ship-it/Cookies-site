<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Commande Shan's Cookies Délices</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #fff8f0;
      padding: 20px;
      max-width: 600px;
      margin: auto;
    }
    h1 {
      color: #a0522d;
      text-align: center;
    }
    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }
    select, input[type="text"], button {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    button {
      background-color: #25D366;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background-color: #1da851;
    }
  </style>
</head>
<body>

  <h1>🍪 Commande Shan's Cookies Délices</h1>

  <form id="formCommande" onsubmit="envoyerWhatsApp(); return false;">
    <label for="produit">Choisissez votre saveur :</label>
    <select name="produit" id="produit" required>
      <option value="">-- Sélectionnez --</option>
      <option value="Choco Craquant">Choco Craquant</option>
      <option value="Vanille Passion">Vanille Passion</option>
      <option value="Caramel Beurre Salé">Caramel Beurre Salé</option>
      <option value="Noix de Coco Rêvée">Noix de Coco Rêvée</option>
      <option value="Citron Gingembre">Citron Gingembre</option>
    </select>

    <label for="transaction">Code de transaction MoMo :</label>
    <input type="text" id="transaction" name="transaction" placeholder="Ex: 123456789" required>

    <button type="submit">Commander via WhatsApp</button>
  </form>

  <script>
    function envoyerWhatsApp() {
      const produit = document.getElementById("produit").value;
      const transaction = document.getElementById("transaction").value;

      const numeroWhatsApp = "22996600126"; // ← Mets ici ton numéro WhatsApp avec indicatif du Bénin
      const message = `Bonjour, je souhaite commander : ${produit}%0ACode MoMo : ${transaction}`;
      const url = `https://wa.me/${numeroWhatsApp}?text=${message}`;

      window.open(url, "_blank");
    }
  </script>

</body>
</html>
