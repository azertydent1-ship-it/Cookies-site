<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Commande Cookies – Paiement Mobile</title>
  <style>
    body {
      font-family: 'Quicksand', sans-serif;
      background: #fff8e1;
      padding: 20px;
      color: #4e342e;
    }
    form {
      max-width: 500px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    input, select, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }
    button {
      background-color: #d81b60;
      color: white;
      border: none;
      padding: 10px;
      margin-top: 20px;
      border-radius: 8px;
      cursor: pointer;
    }
    button:hover {
      background-color: #ad1457;
    }
    .info {
      background: #ffe0b2;
      padding: 10px;
      border-radius: 8px;
      margin-top: 15px;
    }
  </style>
</head>
<body>

  <form action="mailto:azerty.dent1@gmail.com" method="POST" enctype="text/plain">
    <h2>Commande Cookies</h2>
    
    <label>Nom :</label>
    <input type="text" name="Nom" required>

    <label>Numéro de téléphone :</label>
    <input type="text" name="Téléphone" required>

    <label>Choix des cookies :</label>
    <select name="Produit">
      <option>Cookie Chocolat</option>
      <option>Cookie Caramel Beurre Salé</option>
      <option>Cookie Noix & Miel</option>
    </select>

    <label>Quantité :</label>
    <input type="number" name="Quantité" min="1" required>

    <div class="info">
      <p><strong>Montant à payer :</strong> (à calculer selon ton tarif)</p>
      <p><strong>MTN MoMo :</strong> +22996600126</p>
    </div>

    <label>Code de transaction Mobile Money :</label>
    <input type="text" name="Code Transaction" required>

    <label>Adresse de livraison :</label>
    <textarea name="Adresse" rows="3"></textarea>

    <button type="submit">Envoyer la commande</button>
  </form>

</body>
</html>
