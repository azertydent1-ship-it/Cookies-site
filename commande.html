<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Commande Shan's Cookies Délices</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #fff8f0;
      padding: 20px;
      max-width: 600px;
      margin: auto;
    }
    h1 {
      color: #a0522d;
      text-align: center;
    }
    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }
    select, input[type="text"], button {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    button {
      background-color: #a0522d;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background-color: #8b4513;
    }
    .info-paiement {
      background-color: #fff0e0;
      padding: 10px;
      border: 1px dashed #a0522d;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <h1>🍪 Commande Shan's Cookies Délices</h1>

  <div class="info-paiement">
    <p><strong>Étape 1 :</strong> Faites le paiement via MTN MoMo au <strong>+229 96600126</strong></p>
    <p><strong>Étape 2 :</strong> Entrez le code de transaction reçu ci-dessous pour valider votre commande.</p>
  </div>

  <form id="commandeForm">
    <label for="produit">Choisissez votre saveur :</label>
    <select id="produit" required>
      <option value="">-- Sélectionnez --</option>
      <option value="Choco Craquant">Choco Craquant</option>
      <option value="Vanille Passion">Vanille Passion</option>
      <option value="Caramel Beurre Salé">Caramel Beurre Salé</option>
      <option value="Noix de Coco Rêvée">Noix de Coco Rêvée</option>
      <option value="Citron Gingembre">Citron Gingembre</option>
    </select>

    <label for="transaction">Code de transaction MoMo :</label>
    <input type="text" id="transaction" placeholder="Ex: 123456789" pattern="[0-9]{9}" title="Le code doit contenir 9 chiffres" required>

    <button type="submit">Valider la commande</button>
  </form>

  <script>
    document.getElementById("commandeForm").addEventListener("submit", function(e) {
      e.preventDefault();
      
      let produit = document.getElementById("produit").value;
      let code = document.getElementById("transaction").value;

      // Vérifie que le code a bien 9 chiffres
      let regex = /^[0-9]{9}$/;
      if (!regex.test(code)) {
        alert("❌ Le code de transaction doit contenir exactement 9 chiffres.");
        return;
      }

      // Message pour WhatsApp
      let message = `Bonjour, j'ai payé pour la saveur "${produit}" avec le code de transaction ${code}.`;
      let whatsappURL = `https://wa.me/22996600126?text=${encodeURIComponent(message)}`;
      
      // Redirection vers WhatsApp
      window.open(whatsappURL, "_blank");
    });
  </script>

</body>
</html>
