<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reçu de Paiement – Shan's Cookies</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Quicksand', sans-serif;
      background: linear-gradient(to bottom, #fce4ec, #fff8e1);
      color: #4e342e;
      margin: 0;
      padding: 20px;
    }
    .receipt {
      background: white;
      padding: 20px;
      max-width: 600px;
      margin: auto;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    .receipt h2 {
      text-align: center;
      color: #d81b60;
    }
    .receipt table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }
    .receipt th, .receipt td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: center;
    }
    .receipt tfoot td {
      background-color: #ffe0b2;
    }
    .thanks {
      text-align: center;
      font-size: 1.2em;
      margin-top: 20px;
      color: #6a1b9a;
    }
    button {
      display: block;
      margin: 20px auto;
      background-color: #d81b60;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
    }
    button:hover {
      background-color: #ad1457;
    }
  </style>
</head>
<body>

  <section class="receipt" id="receipt">
    <h2>Reçu de Paiement</h2>
    <p><strong>Date :</strong> <span id="date"></span></p>
    <p><strong>Client :</strong> <span id="clientName"></span></p>
    <table>
      <thead>
        <tr>
          <th>Description</th>
          <th>Qté</th>
          <th>Prix Unitaire</th>
          <th>Total</th>
        </tr>
      </thead>
      <tbody id="orderRows"></tbody>
      <tfoot>
        <tr>
          <td colspan="3"><strong>Total à payer</strong></td>
          <td><strong id="totalPrice">0.00€</strong></td>
        </tr>
      </tfoot>
    </table>
    <p><strong>Contact :</strong> +2290196600126</p>
    <p><strong>Instagram :</strong> @Shn_bounce</p>
    <p class="thanks">THANK YOU!</p>
    <button onclick="downloadPDF()">📄 Télécharger en PDF</button>
  </section>

  <script>
    const orderData = {
      client: "Denis",
      date: new Date().toLocaleDateString("fr-FR"),
      items: [
        { description: "Cookie Chocolat", quantity: 3, price: 2.5 },
        { description: "Cookie Caramel Beurre Salé", quantity: 2, price: 3.0 }
      ]
    };

    document.getElementById("date").textContent = orderData.date;
    document.getElementById("clientName").textContent = orderData.client;

    let total = 0;
    orderData.items.forEach(item => {
      const row = document.createElement("tr");
      const itemTotal = item.quantity * item.price;
      total += itemTotal;

      row.innerHTML = `
        <td>${item.description}</td>
        <td>${item.quantity}</td>
        <td>${item.price.toFixed(2)}€</td>
        <td>${itemTotal.toFixed(2)}€</td>
      `;
      document.getElementById("orderRows").appendChild(row);
    });

    document.getElementById("totalPrice").textContent = `${total.toFixed(2)}€`;

    function downloadPDF() {
      window.print(); // Imprime la page comme PDF
    }
  </script>

</body>
</html>
