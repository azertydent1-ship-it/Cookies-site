<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shan's Cookies Delices — Cookies artisanaux moelleux</title>
  <meta name="description" content="Cookies artisanaux moelleux et gourmands. Chocolat, caramel beurre salé, noix & miel. Commandez en ligne facilement." />
  <meta property="og:title" content="Shan's Cookies Delices" />
  <meta property="og:description" content="Des cookies faits avec amour. Commande rapide par formulaire ou WhatsApp." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://azertydent1-ship-it.github.io/Cookies-site/" />
  <meta property="og:image" content="https://littlespoonfarm.com/wp-content/uploads/2021/10/Chewy-chocolate-chip-cookies-on-a-plate-_.jpg" />
  <meta name="theme-color" content="#f7c873" />
  <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/1046/1046784.png" />

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@400;700&display=swap" rel="stylesheet" />

  <style>
    /* Couleurs principales */
    :root {
      --choco: #4e342e;
      --gold: #a67c52;
      --honey: #f7c873;
      --rose: #ffe6f0;
      --cream: #fff8f0;
      --white: #fff;
    }

    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: 'Quicksand', Arial, sans-serif;
      background: linear-gradient(135deg, var(--rose) 0%, var(--cream) 100%);
      color: var(--choco);
    }

    /* Effet chocolat fondu */
    .choco-drip {
      width: 100%;
      height: 65px;
      background: url('https://svgshare.com/i/13rA.svg') repeat-x center top;
      animation: dripDown 1.1s cubic-bezier(.61,1.8,.4,1) 0.6s both;
    }
    @keyframes dripDown {
      from { transform: translateY(-90px); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }

    /* Header */
    header {
      text-align: center;
      color: var(--choco);
    }
    .site-title {
      font-family: 'Fredoka One', cursive;
      font-size: 2.5em;
      color: var(--choco);
      margin: -24px 0 0 0;
      letter-spacing: 1px;
      text-shadow: 2px 2px 0 var(--white), 4px 4px 12px #d7b9a3;
      background: rgba(255,255,255,0.75);
      border-radius: 20px;
      padding: 10px 28px 8px;
      box-shadow: 0 8px 24px rgba(166,124,82,0.07);
      animation: bounceIn 1.2s cubic-bezier(.51,2,.34,.97) 0.5s both;
      display: inline-block;
    }
    .subtitle {
      font-size: 1.15em;
      color: var(--gold);
      font-weight: bold;
      margin: 7px 0 14px;
      letter-spacing: 0.5px;
      opacity: 0;
      animation: fadeIn 1.3s 1.2s both;
    }

    /* Navigation */
    nav { margin-top: 12px; }
    nav a {
      color: var(--white);
      background: linear-gradient(90deg, var(--gold) 70%, var(--honey) 100%);
      text-decoration: none;
      margin: 0 8px;
      font-weight: bold;
      padding: 8px 24px;
      border-radius: 24px;
      font-size: 1.07em;
      box-shadow: 0 2px 8px rgba(166,124,82,0.10);
      opacity: 0;
      animation: fadeIn 1.2s 1.4s both;
      transition: all 0.18s;
    }
    nav a:hover {
      background: linear-gradient(90deg, var(--honey) 80%, var(--gold) 100%);
      color: var(--choco);
      transform: scale(1.09);
      box-shadow: 0 4px 16px #f7c87355;
    }

    /* Animations */
    @keyframes bounceIn {
      0% { transform: scale(0.7); opacity: 0; }
      60% { transform: scale(1.15); opacity: 1; }
      80% { transform: scale(0.95); }
      100% { transform: scale(1); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(24px);}
      to   { opacity: 1; transform: translateY(0);}
    }

    /* Sections */
    section {
      padding: 48px 20px 32px;
      text-align: center;
      opacity: 0;
      animation: fadeIn 1.1s forwards;
    }
    section:nth-of-type(2) { animation-delay: 1.6s; }
    section:nth-of-type(3) { animation-delay: 2.2s; }
    section:nth-of-type(4) { animation-delay: 2.8s; }
    section:nth-of-type(5) { animation-delay: 3.2s; }

    /* Hero */
    .hero {
      padding: 54px 20px 36px;
      background: url('https://littlespoonfarm.com/wp-content/uploads/2021/10/Chewy-chocolate-chip-cookies-on-a-plate-_.jpg') center/cover no-repeat;
      border-radius: 28px;
      margin: 28px auto 30px;
      max-width: 900px;
      box-shadow: 0 8px 32px rgba(166,124,82,0.11);
    }

    /* Produits */
    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
      gap: 32px;
      max-width: 1100px;
      margin: auto;
    }
    .product {
      background: linear-gradient(135deg, var(--white) 70%, var(--rose) 100%);
      border-radius: 18px;
      padding: 18px 14px 24px;
      box-shadow: 0 4px 22px rgba(166,124,82,0.11);
      transition: transform 0.16s, box-shadow 0.16s;
    }
    .product img {
      max-width: 85%;
      border-radius: 13px;
      border: 2px solid var(--rose);
      margin-bottom: 10px;
      box-shadow: 0 2px 12px #f7c87333;
      animation: floatImg 2.6s ease-in-out infinite alternate;
    }
    @keyframes floatImg {
      from { transform: translateY(0px) scale(1);}
      to   { transform: translateY(-14px) scale(1.04);}
    }

    /* CTA */
    .product-cta, .whatsapp-btn {
      display: inline-block;
      background: linear-gradient(90deg, var(--gold) 70%, var(--honey) 100%);
      color: #fff;
      font-weight: 700;
      padding: 10px 16px;
      border-radius: 22px;
      box-shadow: 0 2px 8px rgba(166,124,82,0.15);
      transition: all 0.18s;
      text-decoration: none;
    }
    .product-cta:hover, .whatsapp-btn:hover {
      background: linear-gradient(90deg, var(--honey) 80%, var(--gold) 100%);
      color: var(--choco);
      transform: translateY(-2px);
      box-shadow: 0 8px 18px rgba(166,124,82,0.22);
    }

    /* Footer */
    footer {
      background: linear-gradient(90deg, var(--rose) 80%, var(--honey) 100%);
      color: var(--gold);
      text-align: center;
      padding: 16px;
      margin-top: 26px;
      border-radius: 18px 18px 0 0;
      font-weight: bold;
      letter-spacing: 1px;
      font-size: 1.1em;
      box-shadow: 0 -2px 10px #f7c87325;
      animation: fadeIn 1.1s 3.6s forwards;
    }

    /* Responsive */
    @media (max-width: 700px) {
      nav {
        position: sticky;
        top: 0;
        z-index: 1000;
        background: rgba(255,255,255,0.85);
        backdrop-filter: blur(6px);
        padding: 8px 6px;
        margin-top: 8px;
        box-shadow: 0 6px 16px rgba(166,124,82,0.15);
      }
      nav a { margin: 0 6px; padding: 8px 14px; font-size: 1em; }
    }
  </style>
</head>
<body>
  <!-- Ici, on garde la structure HTML optimisée -->
</body>
</html>
